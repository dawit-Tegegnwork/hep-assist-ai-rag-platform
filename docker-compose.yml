services:
  api:
    build: .
    environment:
      MEDIMIND_ENVIRONMENT: production
      MEDIMIND_DATABASE_URL: postgresql://medimind:medimind@postgres:5432/medimind
      MEDIMIND_AUDIT_LOG_PATH: /app/audit/audit_logs.jsonl
      MEDIMIND_EMBEDDING_PROVIDER: fastembed
      MEDIMIND_AUTO_SEED_ON_STARTUP: "true"
      MEDIMIND_CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      MEDIMIND_FRONTEND_URL: http://localhost:5173
      MEDIMIND_LOG_LEVEL: INFO
      MEDIMIND_RATE_LIMIT_ENABLED: "true"
    ports:
      - "8000:8000"
    volumes:
      - audit-data:/app/audit
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: medimind
      POSTGRES_USER: medimind
      POSTGRES_PASSWORD: medimind
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medimind -d medimind"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  audit-data:
  postgres-data:
