services:
  api:
    build: .
    environment:
      MEDIMIND_DATABASE_URL: postgresql://medimind:medimind@postgres:5432/medimind
      MEDIMIND_AUDIT_LOG_PATH: /app/audit/audit_logs.jsonl
      MEDIMIND_EMBEDDING_PROVIDER: mock
    ports:
      - "8000:8000"
    volumes:
      - audit-data:/app/audit
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: medimind
      POSTGRES_USER: medimind
      POSTGRES_PASSWORD: medimind
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medimind -d medimind"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  audit-data:
  postgres-data:
