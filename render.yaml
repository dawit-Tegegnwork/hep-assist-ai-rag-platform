services:
  - type: web
    name: hep-assist-ai-rag-platform
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health/ready
    envVars:
      - key: MEDIMIND_ENVIRONMENT
        value: production
      - key: MEDIMIND_DATABASE_URL
        value: sqlite:////tmp/hep_assist.db
      - key: MEDIMIND_EMBEDDING_PROVIDER
        value: mock
      - key: MEDIMIND_AUTO_SEED_ON_STARTUP
        value: "true"
      - key: PYTHONPATH
        value: /app/backend
